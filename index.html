<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Task Management CRUD App</title>
		<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
		<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>

	<body class="bg-gray-50 px-4 md:px-6 duration-300 selection:bg-sky-500 selection:text-white">
		<!-- Popup -->
		<div class="popup-action flex items-center justify-center fixed top-0 left-0 w-full h-full bg-black/50 z-10 p-4 opacity-0 pointer-events-none duration-150">
			<div class="popup-container translate-y-6 opacity-0 delay-100 duration-300 p-4 rounded-2xl shadow-md bg-white min-w-md max-w-full text-center border border-gray-100">
				<p>Lorem ipsum dolor sit.</p>
				<div class="flex gap-2 mt-4 justify-center">
					<button class="text-sm px-4 py-2 text-sky-500 rounded-full bg-sky-200 confirm">Confirm</button>
					<button class="text-sm px-4 py-2 bg-red-200 rounded-full text-red-500 cancel">Cancel</button>
				</div>
			</div>
		</div>

		<!-- Form -->
		<section class="crud-form py-6">
			<div class="container mx-auto">
				<div class="crud-header mb-4 flex items-center justify-between gap-4 flex-wrap">
					<div>
						<h2 class="text-2xl uppercase font-medium">Crud App</h2>
						<p class="text-sm text-black/60 max-w-md">Task Management App using HTML, Tailwind CSS, JavaScript, LocalStorage, Drag & Drop, Search, Sort, Filter and Dark Mode.</p>
					</div>

					<!-- Theme Toggle -->
					<button id="themeToggle" class="mt-3 w-16 h-8 rounded-full bg-gray-200 relative duration-300 flex items-center px-1">
						<div id="toggleCircle" class="w-6 h-6 rounded-full bg-white shadow-lg duration-300 flex items-center justify-center text-sm">
							<i class="hgi hgi-stroke hgi-rounded hgi-sun-03"></i>
						</div>
					</button>
				</div>

				<div class="crud-form-container p-4 rounded-2xl shadow-md bg-white border border-gray-100 duration-300">
					<p class="errorElement hidden text-red-500 bg-red-100 rounded-2xl px-4 py-2 mb-2 w-full text-sm text-center"></p>

					<form id="taskForm">
						<!-- Title -->
						<div class="form-inputs mb-2">
							<label for="title" class="text-sm capitalize font-medium inline-block mb-1"> Title </label>
							<input type="text" name="title" id="title" class="w-full border border-gray-200 h-10 rounded-2xl px-4 duration-300 placeholder-gray-400" placeholder="Enter Task Title" />
						</div>

						<!-- Description -->
						<div class="form-inputs mb-2">
							<label for="description" class="text-sm capitalize font-medium inline-block mb-1"> Description </label>
							<textarea name="description" id="description" class="w-full border border-gray-200 h-36 rounded-2xl px-4 py-2 duration-300 placeholder-gray-400" placeholder="Enter Description"></textarea>
						</div>

						<!-- Status -->
						<div class="form-inputs mb-4">
							<label for="status" class="text-sm capitalize font-medium inline-block mb-1"> Status </label>
							<select name="status" id="status" class="w-full border border-gray-200 h-10 rounded-2xl px-4 duration-300">
								<option value="">Select Status</option>
								<option value="Not Started">Not Started</option>
								<option value="In Progress">In Progress</option>
								<option value="Review">Review</option>
								<option value="Done">Done</option>
							</select>
						</div>

						<!-- Buttons -->
						<div>
							<button type="submit" id="addBtn" class="text-sm px-4 py-2 bg-sky-950 rounded-full text-white">Add Task</button>
							<button type="button" id="cancelBtn" class="text-sm px-4 py-2 bg-red-600 rounded-full text-white hidden">Cancel</button>
						</div>
					</form>
				</div>
			</div>
		</section>

		<!-- Tasks -->
		<section class="tasks py-10">
			<div class="container mx-auto">
				<!-- Search + Sort + Filter -->
				<div class="task-search grid md:grid-cols-3 gap-3 mb-4">
					<!-- Search -->
					<div class="form-inputs">
						<label for="search" class="text-sm capitalize font-medium inline-block mb-1"> Search </label>
						<input type="text" name="search" id="search" class="w-full border border-gray-200 h-10 rounded-2xl px-4 duration-300" placeholder="Search By Title" />
					</div>

					<!-- Sort -->
					<div class="form-inputs">
						<label for="sort" class="text-sm capitalize font-medium inline-block mb-1"> Sort </label>
						<select id="sort" class="w-full border border-gray-200 h-10 rounded-2xl px-4 duration-300">
							<option value="">Default</option>
							<option value="a_to_z">A-Z</option>
							<option value="z_to_a">Z-A</option>
						</select>
					</div>

					<!-- Filter -->
					<div class="form-inputs">
						<label for="filterStatus" class="text-sm capitalize font-medium inline-block mb-1"> Filter Status </label>
						<select id="filterStatus" class="w-full border border-gray-200 h-10 rounded-2xl px-4 duration-300">
							<option value="all">All</option>
							<option value="Not Started">Not Started</option>
							<option value="In Progress">In Progress</option>
							<option value="Review">Review</option>
							<option value="Done">Done</option>
						</select>
					</div>
				</div>

				<!-- Tasks -->
				<div class="task-container grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
			</div>
		</section>

		<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
		<script src="./index.js"></script>
	</body>
</html>
